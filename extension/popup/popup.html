<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuffle Importer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0f0f1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 28px; height: 28px;
      background: #8b5cf6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: #e2d9f3; }
    .header small { font-size: 10px; color: rgba(255,255,255,0.35); display: block; margin-top: 1px; }

    .section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .section:last-child { border-bottom: none; }

    .platform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
    }
    .platform-info { display: flex; align-items: center; gap: 8px; }
    .platform-icon { font-size: 16px; width: 22px; text-align: center; }
    .platform-name { font-weight: 500; color: rgba(255,255,255,0.85); }
    .platform-count {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: #8b5cf6; color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); }
    .btn-sm { padding: 3px 8px; font-size: 10px; border-radius: 5px; }

    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      line-height: 1.5;
      margin-top: 6px;
    }
    .hint a { color: #8b5cf6; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .status-msg {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 7px;
      margin-top: 8px;
      display: none;
      line-height: 1.5;
    }
    .status-msg.success { background: rgba(34,197,94,0.15); color: #4ade80; display: block; }
    .status-msg.error   { background: rgba(239,68,68,0.15);  color: #f87171; display: block; }
    .status-msg.progress{ background: rgba(139,92,246,0.12); color: #c4b5fd; display: block; }

    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .open-shuffle {
      font-size: 11px;
      color: #8b5cf6;
      text-decoration: none;
      font-weight: 600;
    }
    .open-shuffle:hover { text-decoration: underline; }
    .total-badge {
      font-size: 11px;
      background: rgba(139,92,246,0.2);
      color: #a78bfa;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .loading { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔀</div>
    <div>
      <h1>Shuffle Importer</h1>
      <small>Bibliothek-Scraper</small>
    </div>
  </div>

  <div class="section" id="current-page-section">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
      <span style="font-weight:600; color:rgba(255,255,255,0.7);">Aktuelle Seite</span>
      <button class="btn btn-primary" id="btn-scrape-now">📥 Seite scannen</button>
    </div>
    <p class="hint" id="page-hint">
      Navigiere zu einer Merkliste/Watchlist und klicke "Seite scannen".
    </p>
    <div class="status-msg" id="scrape-status"></div>
  </div>

  <div class="section" id="library-section">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <span style="font-weight:600; color:rgba(255,255,255,0.7);">Gespeicherte Bibliothek</span>
      <button class="btn btn-ghost btn-sm" id="btn-clear-all">🗑 Alles löschen</button>
    </div>

    <div id="platform-rows">
      <!-- dynamically filled -->
      <p style="color:rgba(255,255,255,0.25); font-size:11px;">Noch keine Daten. Scanne zuerst deine Merklisten.</p>
    </div>
  </div>

  <div class="footer">
    <a href="#" class="open-shuffle" id="btn-open-shuffle">In Shuffle öffnen →</a>
    <span class="total-badge" id="total-count">0 Titel</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
